<!DOCTYPE html>
<html lang="ko">
<head>

  <title>제이엠수학 복습실</title>
</head>
<body>
  <h1>제이엠수학 복습실</h1>

  <h2>오늘의 수업</h2>
  <p>
    수업 전에는 오늘 풀 문제를 확인하고,<br>
    수업 후에는 단계별 풀이와 수업 영상을 복습합니다.
  </p>

  <h2>수업 목록</h2>
  <ul>
    <li>동인고1 공통수학1 기말 대비</li>
    <li>부일고1 공통수학1 기말 대비</li>
    <li>부일고2 미적분I 기말 대비</li>
  </ul>

  <h2>복습 방식</h2>
  <ol>
    <li>문제를 먼저 다시 풀어봅니다.</li>
    <li>수업에서 설명한 풀이 흐름을 단계별로 확인합니다.</li>
    <li>손풀이와 수업 영상을 다시 봅니다.</li>
    <li>변형문제로 같은 사고 과정을 다시 연습합니다.</li>
  </ol>
</body>
